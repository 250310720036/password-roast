<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Password Roaster 🔥</title>

    <link rel="stylesheet" href="style.css">
</head>

<body>

    <div class="emoji emoji1">🔥</div>
    <div class="emoji emoji2">💀</div>
    <div class="emoji emoji3">😭</div>
    <div class="emoji emoji4">🤡</div>
    <div class="emoji emoji5">🔥</div>
    <div class="emoji emoji6">👀</div>

    <div class="card" id="card">

        <div class="watching">
            👀 I'M WATCHING YOUR PASSWORD
        </div>

        <div class="fire">🔥</div>

        <h1>Password Roaster</h1>

        <p class="subtitle">
            Enter your password.<br>
            I promise I won't judge... probably 😈
        </p>

        <div class="password-box">

            <input
                type="password"
                id="password"
                placeholder="Type your masterpiece..."
                autocomplete="off"
            >

            <button id="showBtn">👁️</button>

        </div>

        <button id="roastBtn">
            🔥 ROAST MY PASSWORD 🔥
        </button>

        <div id="roast">
            Waiting to destroy your confidence... 💀
        </div>

        <div class="damage-text">
            EMOTIONAL DAMAGE
            <span id="damage">0</span>%
        </div>

        <div class="damage-bar">
            <div id="damageFill"></div>
        </div>

        <div id="damageEmoji">😌</div>

        <p class="warning">
            ⚠️ Warning: Password feelings may be hurt.
        </p>

    </div>

    <script src="script.js"></script>

</body>

</html>
