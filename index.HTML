<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Password Roaster 🔥</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <div class="floating fire1">🔥</div>
    <div class="floating fire2">💀</div>
    <div class="floating fire3">🔥</div>
    <div class="floating fire4">😭</div>
    <div class="floating fire5">🤡</div>

    <div class="card" id="card">

        <div class="eyes">👀</div>

        <div class="fire">🔥</div>

        <h1>Password Roaster</h1>

        <p class="subtitle">
            Enter your password.<br>
            I promise to be nice 😈
        </p>

        <div class="password-box">

            <input
                type="password"
                id="password"
                placeholder="Enter your password..."
            >

            <button id="showBtn">👁️</button>

        </div>

        <button id="roastBtn">
            ROAST MY PASSWORD 🔥
        </button>

        <div id="roast">
            Waiting to destroy your confidence... 💀
        </div>

        <div class="damage-title">
            Emotional Damage:
            <span id="damage">0</span>%
        </div>

        <div class="damage-bar">

            <div id="damageFill"></div>

        </div>

        <p class="warning">
            ⚠️ No passwords were emotionally prepared for this.
        </p>

    </div>

    <script src="script.js"></script>

</body>

</html>
